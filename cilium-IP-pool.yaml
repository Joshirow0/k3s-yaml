apiVersion: "cilium.io/v2alpha1"
kind: CiliumL2AnnouncementPolicy
metadata:
  name: l2-policy
spec:
  interfaces:
  - eth0   # Change to the name of the interface to announce on
  externalIPs: true
  loadBalancerIPs: true
---
apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: pool
spec:
  blocks: # ip range to allocate from
    - start: 192.168.1.23  # first IP address to allocate
      stop: 192.168.1.33 # last IP address to allocate
  serviceSelector:
    matchLabels:
      io.cilium/needs-ip: "true"
